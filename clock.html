<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aesthetic Minimalist Clock</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #191919; /* Warm off-black background */
    overflow: hidden;
    user-select: none;
}

/* Minimalist White Clock Container */
.clock {
    width: 200px;
    height: 200px;
    border: 2px solid #ffffff; /* Switched from green to clean white */
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); /* Subtle white glow */
}

/* Center Pin */
.clock::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: #ffffff;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

/* Base styling for all hands */
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom center;
    background: #ffffff; /* White hands */
    border-radius: 4px;
    z-index: 5;
}

.hour {
    width: 4px;
    height: 50px;
}

.minute {
    width: 3px;
    height: 70px;
}

/* Sleeker second hand */
.second {
    width: 1.5px;
    height: 80px;
    background: #aaaaaa; /* Soft light grey for subtle contrast */
}

/* Minimalist Dial Indicators */
.indicator {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    color: #ffffff; /* White numbers */
    padding: 6px;
}

.twelve { transform: rotate(0deg); }
.twelve span { display: inline-block; }

.three { transform: rotate(90deg); }
.three span { display: inline-block; transform: rotate(-90deg); }

.six { transform: rotate(180deg); }
.six span { display: inline-block; transform: rotate(-180deg); }

.nine { transform: rotate(270deg); }
.nine span { display: inline-block; transform: rotate(-270deg); }
</style>
</head>
<body>

<div class="clock">
    <!-- Dial Numbers -->
    <div class="indicator twelve"><span>12</span></div>
    <div class="indicator three"><span>3</span></div>
    <div class="indicator six"><span>6</span></div>
    <div class="indicator nine"><span>9</span></div>

    <!-- Clock Hands -->
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="min"></div>
    <div class="hand second" id="sec"></div>
</div>

<script>
const hourHand = document.getElementById('hour');
const minHand = document.getElementById('min');
const secHand = document.getElementById('sec');

function runClock() {
    const now = new Date();
    const secs = now.getSeconds();
    const mins = now.getMinutes();
    const hrs = now.getHours();

    const secDegrees = (secs / 60) * 360;
    const minDegrees = (mins / 60) * 360 + (secs / 60) * 6;
    const hrDegrees = (hrs / 12) * 360 + (mins / 60) * 30;

    secHand.style.transform = `translateX(-50%) rotate(${secDegrees}deg)`;
    minHand.style.transform = `translateX(-50%) rotate(${minDegrees}deg)`;
    hourHand.style.transform = `translateX(-50%) rotate(${hrDegrees}deg)`;
}

setInterval(runClock, 1000);
runClock();
</script>

</body>
</html>
